<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Glowing filters -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aa88" />
      <stop offset="50%" stop-color="#00ffcc" />
      <stop offset="100%" stop-color="#33ffff" />
    </linearGradient>
  </defs>

  <!-- Dark glassmorphic background plate -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="#020d0d" stroke="url(#grad)" stroke-width="5" filter="url(#glow)" />
  
  <!-- Futuristic geometric N / Star graphic -->
  <!-- Left Pillar -->
  <path d="M 36 34 L 54 34 L 54 94 L 36 94 Z" fill="url(#grad)" />
  <!-- Diagonal Slash -->
  <path d="M 54 34 L 74 68 L 74 94 L 54 60 Z" fill="url(#grad)" opacity="0.85" />
  <!-- Right Pillar -->
  <path d="M 74 34 L 92 34 L 92 94 L 74 94 Z" fill="url(#grad)" />
  
  <!-- Glowing Nova Star core -->
  <circle cx="64" cy="51" r="7" fill="#ffffff" filter="url(#glow)" />
  <polygon points="64,36 67,47 78,51 67,55 64,66 61,55 50,51 61,47" fill="#ffffff" />
</svg>
